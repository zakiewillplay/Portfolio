<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zakir Rashid — Web & App Developer</title>
    <meta name="description" content="Zakir Rashid — Web & App Developer building digital products, websites, and experiences for the web.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f4ef;
            --bg-alt: #ede8e0;
            --text: #141413;
            --text-muted: #6b6560;
            --text-subtle: #9c9590;
            --border: #d9d3cb;
            --white: #fafaf9;
            --black: #0d0d0c;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: auto;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            cursor: default;
            transition: background-color 0.6s var(--ease-out-expo);
        }

        /* Grain overlay */
        .grain-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.035;
            mix-blend-mode: multiply;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.5'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 180px 180px;
        }

        /* Loading screen */
        .loader {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            pointer-events: all;
        }
        .loader-top,
        .loader-bottom {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            background: var(--black);
        }
        .loader-top { top: 0; transform-origin: top center; }
        .loader-bottom { bottom: 0; transform-origin: bottom center; }
        .loader-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: var(--white);
        }
        .loader-brand {
            font-family: var(--font-display);
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 600;
            letter-spacing: 0.06em;
            color: #fafaf9;
        }
        .loader-counter {
            font-family: var(--font-display);
            font-size: clamp(3rem, 7vw, 5.5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #fafaf9;
            margin-top: 0.3em;
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum";
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 9990;
            padding: 1.5rem clamp(1.5rem, 5vw, 3.5rem);
            display: flex;
            align-items: center;
            justify-content: space-between;
            mix-blend-mode: difference;
            color: #fafaf9;
            pointer-events: none;
        }
        .nav>* { pointer-events: all; }
        .nav-logo {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.03em;
            text-decoration: none;
            color: inherit;
            transition: opacity 0.3s;
        }
        .nav-logo:hover { opacity: 0.7; }
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            align-items: center;
        }
        .nav-links a {
            font-family: var(--font-body);
            font-weight: 400;
            font-size: 0.9rem;
            letter-spacing: 0.02em;
            text-decoration: none;
            color: inherit;
            transition: opacity 0.3s;
            position: relative;
        }
        .nav-links a:hover { opacity: 0.7; }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 0;
            height: 1px;
            background: currentColor;
            transition: width 0.35s var(--ease-out-expo);
        }
        .nav-links a:hover::after { width: 100%; }

        /* Hero */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: flex-end;
            padding: clamp(2rem, 8vh, 8rem) clamp(1.5rem, 6vw, 5rem) clamp(3rem, 6vh, 5rem);
            position: relative;
            overflow: hidden;
            background: var(--bg);
        }
        .hero-inner {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.3fr 0.7fr;
            grid-template-areas: "name photo" "subtitle photo";
            align-items: end;
            gap: 0.5rem 2rem;
        }
        .hero-text-col { grid-area: name; }
        .hero-photo-col {
            position: relative;
            grid-area: photo;
            height: clamp(280px, 46vw, 480px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .hero-photo-col img {
            max-height: 100%;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            object-position: bottom;
            filter: grayscale(20%);
        }
        .hero-photo-glow {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 60%;
            background: radial-gradient(ellipse at center, rgba(20,20,19,0.06) 0%, transparent 70%);
            z-index: -1;
        }
        .hero-name {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: clamp(4.5rem, 12vw, 11rem);
            line-height: 0.88;
            letter-spacing: -0.03em;
            color: var(--text);
            overflow: hidden;
            user-select: none;
        }
        .hero-name .line {
            display: block;
            overflow: hidden;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
        }
        .hero-name .char { display: inline-block; will-change: transform; }
        .hero-subtitle-wrap {
            grid-area: subtitle;
            margin-top: clamp(1.5rem, 3vh, 2.5rem);
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }
        .hero-subtitle-bar {
            flex-shrink: 0;
            width: 28px;
            height: 1px;
            background: var(--text-subtle);
            margin-top: 0.75em;
        }
        .hero-subtitle {
            font-family: var(--font-body);
            font-weight: 400;
            font-size: clamp(0.95rem, 1.7vw, 1.15rem);
            color: var(--text-muted);
            max-width: 440px;
            line-height: 1.6;
            letter-spacing: 0.01em;
        }
        .hero-scroll-indicator {
            position: absolute;
            bottom: 2.5rem;
            right: clamp(1.5rem, 6vw, 5rem);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-body);
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            opacity: 0.7;
        }
        .hero-scroll-line {
            width: 1px;
            height: 40px;
            background: var(--text-muted);
            animation: scrollPulse 2s ease-in-out infinite;
        }
        @keyframes scrollPulse {
            0%,100% { transform: scaleY(0.4); opacity: 0.4; }
            50% { transform: scaleY(1); opacity: 1; }
        }

        /* Projects */
        .projects-section { position: relative; background: var(--bg); z-index: 2; }
        .projects-sticky {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
        }
        .projects-track {
            display: flex;
            gap: 0;
            will-change: transform;
            padding-left: clamp(1.5rem, 6vw, 5rem);
        }
        .project-item {
            flex-shrink: 0;
            width: clamp(320px, 75vw, 850px);
            padding-right: clamp(2rem, 8vw, 6rem);
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
            position: relative;
            user-select: none;
            transition: opacity 0.4s var(--ease-out-expo);
        }
        .project-number {
            font-family: var(--font-display);
            font-size: clamp(0.75rem, 1.2vw, 0.9rem);
            font-weight: 500;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
            transition: color 0.4s;
        }
        .project-title {
            font-family: var(--font-display);
            font-size: clamp(2.2rem, 5.5vw, 4.5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.05;
            color: var(--text);
            transition: transform 0.4s var(--ease-out-expo), color 0.4s;
            margin-bottom: 0.5rem;
            display: inline-block;
        }
        .project-tag {
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.03em;
            color: var(--text-muted);
            transition: color 0.4s;
            text-transform: uppercase;
        }
        .project-visual {
            margin-top: clamp(1.5rem, 3vh, 2.5rem);
            width: 100%;
            aspect-ratio: 16/10;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            background: var(--bg-alt);
            border: 1px solid var(--border);
            transition: transform 0.5s var(--ease-out-expo), box-shadow 0.5s var(--ease-out-expo);
        }
        .project-visual img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s var(--ease-out-expo);
        }
        .project-visual-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.5;
            transition: all 0.6s var(--ease-out-expo);
            z-index: 0;
        }
        .project-item:hover .project-visual {
            transform: scale(1.02);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
        }
        .project-item:hover .project-visual img {
            transform: scale(1.05);
        }
        .project-link {
            display: inline-block;
            margin-top: 1.2rem;
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--text);
            text-decoration: none;
            position: relative;
            padding-bottom: 2px;
            transition: opacity 0.3s;
        }
        .project-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--text);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s var(--ease-out-expo);
        }
        .project-item:hover .project-link::after {
            transform: scaleX(1);
            transform-origin: left;
        }
        .project-link:hover { opacity: 0.7; }
        .project-item:not(:hover) {
            opacity: 0.9;
        }
        .projects-track:hover .project-item:not(:hover) {
            opacity: 0.55;
            transition: opacity 0.5s var(--ease-out-expo);
        }
        .projects-track .project-item:hover {
            opacity: 1;
        }
        .projects-track .project-item:hover .project-title {
            transform: scale(1.04);
        }

        /* Cursor preview */
        .cursor-preview {
            position: fixed;
            pointer-events: none;
            z-index: 9995;
            width: 200px;
            height: 130px;
            border-radius: 6px;
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.85);
            transition: opacity 0.25s, transform 0.25s var(--ease-out-expo);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            overflow: hidden;
            will-change: transform, opacity, left, top;
        }
        .cursor-preview.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .cursor-preview-inner {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            color: #fff;
        }

        /* Skills marquee */
        .skills-section {
            padding: clamp(4rem, 10vh, 8rem) 0;
            background: var(--bg);
            overflow: hidden;
            position: relative;
            z-index: 2;
        }
        .skills-label {
            font-family: var(--font-body);
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 0 clamp(1.5rem, 6vw, 5rem);
            margin-bottom: 2rem;
            opacity: 0.7;
        }
        .marquee-row {
            display: flex;
            gap: 0;
            width: max-content;
            animation: marqueeScroll 28s linear infinite;
            will-change: transform;
            padding: 0.6rem 0;
        }
        .marquee-row.reverse { animation-direction: reverse; animation-duration: 22s; }
        @keyframes marqueeScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .marquee-word {
            font-family: var(--font-display);
            font-size: clamp(2rem, 4.5vw, 3.5rem);
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text);
            padding: 0 clamp(1rem, 3vw, 2.5rem);
            white-space: nowrap;
            transition: all 0.5s var(--ease-out-expo);
            cursor: default;
            position: relative;
            flex-shrink: 0;
        }
        .marquee-word:hover {
            transform: scale(1.25);
            z-index: 5;
        }
        .marquee-row:hover .marquee-word:not(:hover) {
            opacity: 0.25;
            transition: opacity 0.5s var(--ease-out-expo);
        }
        .marquee-word .tooltip {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            background: var(--text);
            color: var(--bg);
            font-family: var(--font-body);
            font-size: 0.7rem;
            font-weight: 500;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            letter-spacing: 0.02em;
        }
        .marquee-word:hover .tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .marquee-row.paused { animation-play-state: paused; }

        /* About */
        .about-section {
            padding: clamp(4rem, 10vh, 8rem) clamp(1.5rem, 6vw, 5rem);
            background: var(--bg);
            position: relative;
            z-index: 2;
        }
        .about-inner { max-width: 1100px; margin: 0 auto; }
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: clamp(2.5rem, 6vw, 5rem);
            align-items: center;
        }
        .about-photo-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 5;
            overflow: hidden;
            border-radius: 4px;
            background: var(--bg-alt);
        }
        .about-photo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(45%) contrast(1.02);
            transition: filter 0.6s var(--ease-out-expo);
        }
        .about-photo-wrap:hover img { filter: grayscale(0%) contrast(1.02); }
        .about-photo-frame {
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(250,250,249,0.35);
            pointer-events: none;
        }
        @media (max-width: 800px) {
            .about-grid { grid-template-columns: 1fr; }
            .about-photo-wrap { max-width: 340px; margin: 0 auto 1rem; }
        }
        .about-eyebrow {
            font-family: var(--font-body);
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 2rem;
            opacity: 0.7;
        }
        .about-headline {
            font-family: var(--font-display);
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.2;
            color: var(--text);
            margin-bottom: 2rem;
        }
        .about-text {
            font-family: var(--font-body);
            font-size: clamp(1rem, 1.6vw, 1.2rem);
            font-weight: 400;
            line-height: 1.7;
            color: var(--text-muted);
            max-width: 620px;
        }
        .about-text strong { color: var(--text); font-weight: 500; }

        /* Contact */
        .contact-section {
            padding: clamp(3rem, 8vh, 6rem) clamp(1.5rem, 6vw, 5rem) clamp(5rem, 12vh, 8rem);
            background: var(--bg);
            position: relative;
            z-index: 2;
            text-align: center;
        }
        .contact-inner { max-width: 600px; margin: 0 auto; }
        .contact-eyebrow {
            font-family: var(--font-body);
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            opacity: 0.7;
        }
        .contact-email {
            font-family: var(--font-display);
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text);
            text-decoration: none;
            display: inline-block;
            position: relative;
            transition: opacity 0.3s;
            padding-bottom: 4px;
        }
        .contact-email::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--text);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.5s var(--ease-out-expo);
        }
        .contact-email:hover::after { transform: scaleX(1); transform-origin: left; }
        .contact-email:hover { opacity: 0.75; }
        .contact-links {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-top: 2.5rem;
            flex-wrap: wrap;
        }
        .contact-link {
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
            position: relative;
        }
        .contact-link:hover { color: var(--text); }
        .contact-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--text);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.35s var(--ease-out-expo);
        }
        .contact-link:hover::after { transform: scaleX(1); transform-origin: left; }

        .footer {
            padding: 1.5rem clamp(1.5rem, 6vw, 5rem);
            text-align: center;
            font-family: var(--font-body);
            font-size: 0.75rem;
            letter-spacing: 0.04em;
            color: var(--text-subtle);
            background: var(--bg);
            position: relative;
            z-index: 2;
        }

        .magnetic { display: inline-block; will-change: transform; transition: transform 0.15s ease-out; }

        /* Responsive */
        @media (max-width: 768px) {
            .nav { padding: 1rem 1.2rem; }
            .nav-links { gap: 1.2rem; }
            .nav-links a { font-size: 0.8rem; }
            .nav-logo { font-size: 0.9rem; }
            .hero { min-height: 90vh; padding: 5rem 1.2rem 3rem; }
            .hero-inner {
                grid-template-columns: 1.15fr 0.85fr;
                grid-template-areas: "name photo" "subtitle subtitle";
                align-items: end;
                gap: 0.5rem 0.8rem;
            }
            .hero-text-col { order: 0; grid-area: name; }
            .hero-photo-col { order: 1; grid-area: photo; height: clamp(150px, 46vw, 230px); margin-top: 0; }
            .hero-subtitle-wrap { grid-area: subtitle; margin-top: 1.2rem; }
            .hero-name { font-size: clamp(2.3rem, 11vw, 3.6rem); }
            .hero-subtitle { font-size: 0.95rem; max-width: 100%; }
            .hero-scroll-indicator { display: none; }
            .projects-sticky { position: relative; height: auto; overflow: visible; }
            .projects-track { flex-direction: column; padding-left: 0; width: 100% !important; transform: none !important; }
            .project-item { width: 100%; padding: 2rem 1.2rem; }
            .project-visual { aspect-ratio: 16/9; }
            .project-title { font-size: clamp(1.6rem, 7vw, 2.5rem); }
            .cursor-preview { display: none !important; }
            .marquee-word { font-size: clamp(1.4rem, 5vw, 2.2rem); padding: 0 0.8rem; }
            .about-section { padding: 3rem 1.2rem; }
            .contact-section { padding: 3rem 1.2rem 5rem; }
            .contact-email { font-size: clamp(1.5rem, 6vw, 2.5rem); }
        }
    </style>
</head>
<body>

    <!-- Loading screen -->
    <div class="loader" id="loader" aria-hidden="true">
        <div class="loader-top"></div>
        <div class="loader-bottom"></div>
        <div class="loader-content">
            <div class="loader-brand">ZAKIR.DEV</div>
            <div class="loader-counter" id="loaderCounter">0</div>
        </div>
    </div>

    <div class="grain-overlay" aria-hidden="true"></div>

    <!-- Cursor preview -->
    <div class="cursor-preview" id="cursorPreview" aria-hidden="true">
        <div class="cursor-preview-inner" id="cursorPreviewInner"></div>
    </div>

    <nav class="nav" id="nav">
        <a href="#" class="nav-logo magnetic" data-magnetic>Zakir.dev</a>
        <ul class="nav-links">
            <li><a href="#work" class="magnetic" data-magnetic>Work</a></li>
            <li><a href="#about" class="magnetic" data-magnetic>About</a></li>
            <li><a href="#contact" class="magnetic" data-magnetic>Contact</a></li>
        </ul>
    </nav>

    <main id="mainContent">
